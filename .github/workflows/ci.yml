name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-tests:
    name: Node 测试（引擎/解释器/Worker/跨引擎一致性）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: npm test

  python-tests:
    name: Python 测试（shuyu_engine）
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m unittest discover -s tests -v
